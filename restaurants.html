<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nearby Restaurants</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #e8f4ff 0%, #d0e8fb 30%, #c8e2ff 65%, #ddf0ff 100%);
      color: #1a2a3a;
    }

    /* ── Nav ── */
    .nav-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 20px 16px 0;
    }
    nav {
      width: 100%;
      max-width: 1100px;
      display: flex;
      gap: 8px;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 16px;
      padding: 8px;
      box-shadow: 0 4px 24px rgba(46,134,222,0.1);
    }
    nav a {
      padding: 9px 20px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
      color: #3a6ea8;
      transition: all 0.2s;
      letter-spacing: 0.2px;
    }
    nav a:hover { background: rgba(46,134,222,0.08); color: #1a5fa8; }
    nav a.active {
      background: linear-gradient(135deg, #2e86de, #1a6fc4);
      color: #fff;
      box-shadow: 0 3px 12px rgba(46,134,222,0.35);
    }

    /* ── Hero ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 32px;
    }
    .hero-icon {
      font-size: 3.2rem;
      margin-bottom: 16px;
      filter: drop-shadow(0 4px 14px rgba(46,134,222,0.3));
    }
    h1 {
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1.1;
      background: linear-gradient(135deg, #1a3a5c 0%, #2e86de 60%, #5ba4f5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 10px;
    }
    .subtitle {
      font-size: 1rem;
      color: #6688aa;
      text-align: center;
      font-weight: 500;
      margin-bottom: 36px;
    }

    /* ── Search card ── */
    .search-card {
      width: 100%;
      max-width: 620px;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 8px 40px rgba(46,134,222,0.15);
      margin-bottom: 16px;
    }
    .search-input-wrap {
      position: relative;
      margin-bottom: 14px;
    }
    .search-input-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
    }
    .search-input-wrap input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      border: 2px solid #cce0f8;
      border-radius: 14px;
      background: #ffffff;
      color: #1a2a3a;
      font-size: 1.05rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input-wrap input::placeholder { color: #9ab8d8; }
    .search-input-wrap input:focus {
      border-color: #2e86de;
      box-shadow: 0 0 0 4px rgba(46,134,222,0.12);
    }
    .search-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #2e86de, #1a6fc4);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 18px rgba(46,134,222,0.4);
      letter-spacing: 0.3px;
    }
    .search-btn:hover { box-shadow: 0 8px 28px rgba(46,134,222,0.5); transform: translateY(-1px); }
    .search-btn:active { transform: scale(0.98); }

    /* ── Filter chips ── */
    .filters-wrap {
      width: 100%;
      max-width: 620px;
      margin-bottom: 32px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .filter-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8899bb;
      min-width: 46px;
    }
    .chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .chip {
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: 2px solid rgba(46,134,222,0.18);
      background: rgba(255,255,255,0.7);
      color: #4a7aaa;
      transition: all 0.2s;
      user-select: none;
      white-space: nowrap;
    }
    .chip:hover { border-color: #2e86de; color: #1a6fc4; background: rgba(46,134,222,0.06); }
    .chip.active {
      background: linear-gradient(135deg, #2e86de, #1a6fc4);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 3px 10px rgba(46,134,222,0.35);
    }
    .chip-sm { padding: 5px 12px; font-size: 0.76rem; }

    /* ── Content area ── */
    .content {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 16px 60px;
    }

    .error {
      color: #e74c3c;
      font-size: 0.9rem;
      margin-bottom: 16px;
      text-align: center;
      font-weight: 500;
      min-height: 22px;
    }

    /* ── Spinner ── */
    .spinner-wrap {
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 14px;
      padding: 48px;
    }
    .spinner-wrap.active { display: flex; }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(46,134,222,0.15);
      border-top-color: #2e86de;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    .spinner-text { font-size: 0.9rem; color: #7799bb; font-weight: 500; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Summary bar ── */
    .summary-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(135deg, #2364b0 0%, #1a5fad 100%);
      border-radius: 20px;
      padding: 20px 28px;
      margin-bottom: 22px;
      box-shadow: 0 8px 36px rgba(46,134,222,0.28);
      flex-wrap: wrap;
      gap: 14px;
    }
    .summary-bar.visible { display: flex; }
    .summary-left { display: flex; align-items: center; gap: 14px; }
    .summary-icon { font-size: 2rem; }
    .summary-location { color: #fff; }
    .summary-location .loc-name { font-size: 1.15rem; font-weight: 800; line-height: 1.2; }
    .summary-location .loc-sub  { font-size: 0.76rem; color: rgba(255,255,255,0.6); margin-top: 3px; }
    .summary-count {
      background: rgba(255,255,255,0.18);
      border-radius: 14px;
      padding: 12px 22px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .count-num   { font-size: 1.7rem; font-weight: 900; color: #fff; line-height: 1; }
    .count-label { font-size: 0.65rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 4px; }

    /* ── Map ── */
    .map-wrap { display: none; margin-bottom: 24px; }
    .map-wrap.visible { display: block; }
    #map {
      width: 100%;
      height: 400px;
      border-radius: 20px;
      border: 1px solid rgba(200,223,245,0.5);
      overflow: hidden;
      box-shadow: 0 8px 36px rgba(46,134,222,0.15);
    }

    /* ── Card grid ── */
    .section-title {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #8899bb;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(46,134,222,0.12);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 16px;
    }

    .rest-card {
      background: rgba(255,255,255,0.84);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 4px 22px rgba(46,134,222,0.08);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      animation: fadeUp 0.4s ease both;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .rest-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 18px 52px rgba(46,134,222,0.18);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .card-num {
      min-width: 30px;
      height: 30px;
      border-radius: 9px;
      background: linear-gradient(135deg, #e8f3ff, #d0e8ff);
      color: #2e6db4;
      font-size: 0.72rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .card-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1a2a3a;
      line-height: 1.3;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .cuisine-badge {
      display: inline-block;
      padding: 4px 11px;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e8f3ff, #d8edff);
      color: #2e6db4;
      border: 1px solid #bcd9f4;
      letter-spacing: 0.3px;
      text-transform: capitalize;
    }
    .dist-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 0.76rem;
      font-weight: 600;
      color: #7799bb;
    }

    .open-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 13px;
      border-radius: 100px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .open-yes     { background: #d4fae8; color: #00804a; border: 1px solid #7dd8a8; }
    .open-no      { background: #ffd8d8; color: #c0392b; border: 1px solid #e08888; }
    .open-unknown { background: #f0f4f8; color: #8899bb; border: 1px solid #c8d8ec; }
    .dot { font-size: 0.55rem; }

    .card-hours {
      font-size: 0.76rem;
      color: #6688aa;
      line-height: 1.65;
      padding: 10px 14px;
      background: rgba(46,134,222,0.04);
      border-radius: 10px;
      border: 1px solid rgba(46,134,222,0.09);
    }

    .card-footer { margin-top: auto; }
    .map-pin-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #2e86de;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.82rem;
      padding: 8px 16px;
      border-radius: 10px;
      background: rgba(46,134,222,0.08);
      transition: all 0.2s;
      border: 1px solid rgba(46,134,222,0.14);
    }
    .map-pin-link:hover { background: rgba(46,134,222,0.15); transform: translateX(2px); }

    /* ── No results ── */
    .no-results {
      text-align: center;
      padding: 64px 20px;
      color: #8899bb;
    }
    .no-results .no-icon { font-size: 3.2rem; margin-bottom: 14px; }
    .no-results p { font-size: 0.95rem; font-weight: 500; }

    /* ── Responsive ── */
    @media (max-width: 860px) {
      .card-grid { grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); }
    }
    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
      .hero { padding: 32px 16px 20px; }
      nav { flex-wrap: wrap; }
      nav a { font-size: 0.82rem; padding: 7px 14px; }
      .search-card { padding: 16px; border-radius: 18px; }
      .card-grid { grid-template-columns: 1fr; }
      #map { height: 280px; }
      .summary-bar { padding: 14px 18px; }
      .count-num { font-size: 1.4rem; }
    }
    @media (max-width: 400px) {
      h1 { font-size: 1.75rem; }
      #map { height: 240px; }
    }
  </style>
</head>
<body>

  <div class="nav-wrap">
    <nav>
      <a href="index.html">Enroute Weather</a>
      <a href="restaurants.html" class="active">Restaurants</a>
    </nav>
  </div>

  <div class="hero">
    <div class="hero-icon">🍽️</div>
    <h1>Nearby Restaurants</h1>
    <p class="subtitle">Discover dining options around any US location</p>

    <div class="search-card">
      <div class="search-input-wrap">
        <span class="search-input-icon">📍</span>
        <input type="text" id="addr" value="Chicago, IL" autocomplete="off" placeholder="Enter city, address, or zip code" />
      </div>
      <button class="search-btn" id="searchBtn">Find Restaurants</button>
    </div>

    <div class="filters-wrap">
      <div class="filter-group">
        <span class="filter-label">Cuisine</span>
        <div class="chips" id="cuisineChips">
          <span class="chip active" data-value="">All</span>
          <span class="chip" data-value="american">American</span>
          <span class="chip" data-value="pizza">Pizza</span>
          <span class="chip" data-value="burger">Burger</span>
          <span class="chip" data-value="mexican">Mexican</span>
          <span class="chip" data-value="chinese">Chinese</span>
          <span class="chip" data-value="italian">Italian</span>
          <span class="chip" data-value="sandwich">Sandwich</span>
          <span class="chip" data-value="coffee_shop">Coffee</span>
          <span class="chip" data-value="fast_food">Fast Food</span>
          <span class="chip" data-value="indian">Indian</span>
        </div>
      </div>
      <div class="filter-group">
        <span class="filter-label">Radius</span>
        <div class="chips" id="radiusChips">
          <span class="chip chip-sm" data-value="805">0.5 mi</span>
          <span class="chip chip-sm active" data-value="1609">1 mi</span>
          <span class="chip chip-sm" data-value="3219">2 mi</span>
          <span class="chip chip-sm" data-value="8047">5 mi</span>
        </div>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="error" id="errorMsg"></div>

    <div class="spinner-wrap" id="spinnerWrap">
      <div class="spinner"></div>
      <span class="spinner-text" id="spinnerText">Searching for restaurants…</span>
    </div>

    <div class="summary-bar" id="summaryBanner">
      <div class="summary-left">
        <div class="summary-icon">📍</div>
        <div class="summary-location">
          <div class="loc-name" id="locName">--</div>
          <div class="loc-sub" id="locSub">--</div>
        </div>
      </div>
      <div class="summary-count">
        <div class="count-num" id="restCount">--</div>
        <div class="count-label">Restaurants Found</div>
      </div>
    </div>

    <div class="map-wrap" id="mapWrap">
      <div id="map"></div>
    </div>

    <div id="resultsArea"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ── Chip selection ──
    function setupChips(groupId) {
      document.getElementById(groupId).addEventListener('click', e => {
        const chip = e.target.closest('.chip');
        if (!chip) return;
        document.getElementById(groupId).querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
      });
    }
    setupChips('cuisineChips');
    setupChips('radiusChips');

    function getChipValue(groupId) {
      const active = document.getElementById(groupId).querySelector('.chip.active');
      return active ? active.dataset.value : '';
    }

    // ── Utilities ──
    function haversine(lat1, lon1, lat2, lon2) {
      const R = 3958.8;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat/2)**2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // ── Geocoding ──
    async function fetchGeo(address) {
      const url = `https://nominatim.openstreetmap.org/search?` +
        new URLSearchParams({ q: address, countrycodes: 'us', format: 'json', limit: 1, addressdetails: 1 });
      const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
      if (!res.ok) throw new Error(`Could not geocode: "${address}"`);
      const data = await res.json();
      if (!data.length) throw new Error(`Address not found: "${address}". Try adding a city or state.`);
      const place = data[0];
      const addr = place.address;
      return {
        lat:     parseFloat(place.lat),
        lon:     parseFloat(place.lon),
        city:    addr.city || addr.town || addr.village || addr.county || '',
        state:   addr.state || '',
        display: place.display_name.split(',').slice(0, 3).join(','),
      };
    }

    // ── Overpass ──
    async function fetchRestaurants(lat, lon, radiusM, cuisine) {
      const cuisineFilter = cuisine ? `["cuisine"~"${cuisine}",i]` : '';
      const query = `
        [out:json][timeout:30];
        node["amenity"="restaurant"]${cuisineFilter}(around:${radiusM},${lat},${lon});
        out body;
      `;
      const res = await fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST',
        body: 'data=' + encodeURIComponent(query),
      });
      if (!res.ok) throw new Error('Could not fetch restaurant data.');
      const data = await res.json();
      return (data.elements || []).filter(r => r.tags && r.tags.name);
    }

    // ── Opening hours parser ──
    function isOpenNow(oh) {
      if (!oh) return 'unknown';
      if (oh.trim() === '24/7') return 'open';
      const now = new Date();
      const dayNames = ['su','mo','tu','we','th','fr','sa'];
      const todayKey = dayNames[now.getDay()];
      const curMin = now.getHours() * 60 + now.getMinutes();
      for (const rule of oh.toLowerCase().split(';').map(s => s.trim()).filter(Boolean)) {
        const m = rule.match(/^([a-z,\-]+)\s+(\d{1,2}:\d{2})-(\d{1,2}:\d{2})$/);
        if (!m) continue;
        if (dayMatches(m[1], todayKey)) {
          const openMin = timeToMin(m[2]), closeMin = timeToMin(m[3]);
          return (curMin >= openMin && curMin < closeMin) ? 'open' : 'closed';
        }
      }
      return 'unknown';
    }
    function timeToMin(t) { const [h, m] = t.split(':').map(Number); return h * 60 + m; }
    const DAY_IDX = { mo:0, tu:1, we:2, th:3, fr:4, sa:5, su:6 };
    function dayMatches(dayPart, todayKey) {
      for (const s of dayPart.split(',').map(x => x.trim())) {
        if (s.includes('-')) {
          const [from, to] = s.split('-');
          const fi = DAY_IDX[from], ti = DAY_IDX[to], ci = DAY_IDX[todayKey];
          if (fi !== undefined && ti !== undefined && ci !== undefined &&
              (fi <= ti ? (ci >= fi && ci <= ti) : (ci >= fi || ci <= ti))) return true;
        } else if (s === todayKey) return true;
      }
      return false;
    }
    function cuisineLabel(tags) {
      return tags.cuisine ? tags.cuisine.replace(/_/g,' ').replace(/;.*/,'').trim() : 'Restaurant';
    }

    // ── Map ──
    let map = null, layerGroup = null, restLayerGroup = null, restIcon = null;
    function initMap() {
      if (map) return;
      map = L.map('map', { center: [39.5, -98.35], zoom: 13, scrollWheelZoom: true });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
        subdomains: 'abcd', maxZoom: 19,
      }).addTo(map);
      layerGroup     = L.layerGroup().addTo(map);
      restLayerGroup = L.layerGroup().addTo(map);
      restIcon = L.divIcon({
        className: '',
        html: `<div style="font-size:18px;line-height:1">🍽️</div>`,
        iconSize: [22,22], iconAnchor: [11,11], popupAnchor: [0,-13],
      });
    }
    function makeIcon(color) {
      return L.divIcon({
        className: '',
        html: `<div style="width:16px;height:16px;border-radius:50%;background:${color};border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>`,
        iconSize: [16,16], iconAnchor: [8,8], popupAnchor: [0,-10],
      });
    }
    function renderMap(geo, restaurants) {
      initMap();
      layerGroup.clearLayers();
      restLayerGroup.clearLayers();
      L.marker([geo.lat, geo.lon], { icon: makeIcon('#ff3d3d') })
        .bindPopup(`<strong>${geo.display}</strong>`).addTo(layerGroup).openPopup();
      for (const r of restaurants) {
        L.marker([r.lat, r.lon], { icon: restIcon })
          .bindPopup(`<strong>${r.tags.name}</strong><br><em>${cuisineLabel(r.tags)}</em>`)
          .addTo(restLayerGroup);
      }
      map.setView([geo.lat, geo.lon], 14);
    }

    // ── Render cards ──
    function renderCards(restaurants, geo) {
      const area = document.getElementById('resultsArea');
      if (!restaurants.length) {
        area.innerHTML = `
          <div class="no-results">
            <div class="no-icon">🔍</div>
            <p>No restaurants found. Try increasing the radius or removing the cuisine filter.</p>
          </div>`;
        return;
      }

      const cards = restaurants.map((r, idx) => {
        const name       = r.tags.name || '—';
        const cuisine    = cuisineLabel(r.tags);
        const distMi     = haversine(geo.lat, geo.lon, r.lat, r.lon);
        const distStr    = distMi < 0.1 ? `${Math.round(distMi * 5280)} ft` : `${distMi.toFixed(2)} mi`;
        const openStatus = isOpenNow(r.tags.opening_hours);
        const openHTML   = openStatus === 'open'
          ? '<span class="open-badge open-yes"><span class="dot">●</span> Open now</span>'
          : openStatus === 'closed'
          ? '<span class="open-badge open-no"><span class="dot">●</span> Closed</span>'
          : '<span class="open-badge open-unknown"><span class="dot">●</span> Hours unknown</span>';
        const hoursText  = r.tags.opening_hours
          ? r.tags.opening_hours.replace(/;/g, '<br>') : null;
        const mapsUrl    = `https://www.openstreetmap.org/?mlat=${r.lat}&mlon=${r.lon}&zoom=17`;

        return `
          <div class="rest-card" style="animation-delay:${Math.min(idx * 40, 500)}ms">
            <div class="card-top">
              <div class="card-num">${idx + 1}</div>
              <div class="card-name">${name}</div>
            </div>
            <div class="card-meta">
              <span class="cuisine-badge">${cuisine}</span>
              <span class="dist-badge">📍 ${distStr}</span>
            </div>
            <div>${openHTML}</div>
            ${hoursText ? `<div class="card-hours">${hoursText}</div>` : ''}
            <div class="card-footer">
              <a class="map-pin-link" href="${mapsUrl}" target="_blank" rel="noopener">🗺️ View on Map →</a>
            </div>
          </div>`;
      }).join('');

      area.innerHTML = `
        <div class="section-title">Restaurants (${restaurants.length})</div>
        <div class="card-grid">${cards}</div>`;
    }

    // ── Search ──
    function showError(msg) {
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('summaryBanner').classList.remove('visible');
      document.getElementById('mapWrap').classList.remove('visible');
      document.getElementById('resultsArea').innerHTML = '';
    }

    async function search() {
      const addr    = document.getElementById('addr').value.trim();
      const cuisine = getChipValue('cuisineChips');
      const radiusM = parseInt(getChipValue('radiusChips') || '1609', 10);

      if (!addr) { showError('Please enter a location.'); return; }

      document.getElementById('errorMsg').textContent = '';
      document.getElementById('spinnerWrap').classList.add('active');
      document.getElementById('spinnerText').textContent = 'Finding your location…';
      document.getElementById('summaryBanner').classList.remove('visible');
      document.getElementById('mapWrap').classList.remove('visible');
      document.getElementById('resultsArea').innerHTML = '';

      try {
        const geo = await fetchGeo(addr);

        document.getElementById('mapWrap').classList.add('visible');
        renderMap(geo, []);
        map.invalidateSize();

        document.getElementById('spinnerText').textContent = 'Searching for nearby restaurants…';

        const restaurants = await fetchRestaurants(geo.lat, geo.lon, radiusM, cuisine);
        restaurants.sort((a, b) =>
          haversine(geo.lat, geo.lon, a.lat, a.lon) -
          haversine(geo.lat, geo.lon, b.lat, b.lon)
        );

        renderMap(geo, restaurants);
        map.invalidateSize();

        document.getElementById('locName').textContent = geo.city
          ? `${geo.city}${geo.state ? ', ' + geo.state : ''}` : geo.display;
        document.getElementById('locSub').textContent = geo.display;
        document.getElementById('restCount').textContent = restaurants.length;
        document.getElementById('summaryBanner').classList.add('visible');

        renderCards(restaurants, geo);

      } catch (err) {
        showError(err.message || 'Something went wrong. Please try again.');
      } finally {
        document.getElementById('spinnerWrap').classList.remove('active');
      }
    }

    document.getElementById('searchBtn').addEventListener('click', search);
    document.getElementById('addr').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
  </script>
</body>
</html>
