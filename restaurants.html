<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nearby Restaurants</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #e0f0ff 0%, #c8e4fb 50%, #dceffe 100%);
      color: #1a2a3a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }

    nav {
      width: 100%;
      max-width: 1100px;
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
    }
    nav a {
      padding: 8px 18px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      color: #2e86de;
      background: #ffffff;
      border: 1px solid #c8dff5;
      box-shadow: 0 2px 6px rgba(46,134,222,0.1);
      transition: background 0.2s;
    }
    nav a:hover { background: #e8f3ff; }
    nav a.active { background: #2e86de; color: #fff; border-color: #2e86de; }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 8px;
      color: #1a3a5c;
      text-align: center;
    }
    .subtitle {
      font-size: 0.9rem;
      color: #5577aa;
      margin-bottom: 32px;
      text-align: center;
    }

    .search-row {
      display: flex;
      gap: 16px;
      width: 100%;
      max-width: 700px;
      margin-bottom: 12px;
      align-items: flex-end;
    }
    .addr-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .addr-group label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #5577aa;
    }
    .addr-group input {
      padding: 13px 16px;
      border: 2px solid #90bde0;
      border-radius: 12px;
      background: #ffffff;
      color: #1a2a3a;
      font-size: 1.05rem;
      outline: none;
      transition: border-color 0.2s;
      box-shadow: 0 2px 8px rgba(100,160,220,0.15);
    }
    .addr-group input::placeholder { color: #99aabb; }
    .addr-group input:focus { border-color: #2e86de; }

    .search-btn {
      padding: 13px 24px;
      border: none;
      border-radius: 12px;
      background: #2e86de;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 2px 8px rgba(46,134,222,0.3);
      white-space: nowrap;
    }
    .search-btn:hover { background: #1a6fc4; }
    .search-btn:active { transform: scale(0.97); }

    .filter-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      width: 100%;
      max-width: 700px;
      margin-bottom: 20px;
      align-items: center;
    }
    .filter-row label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #5577aa;
    }
    .filter-row select {
      padding: 8px 12px;
      border: 2px solid #90bde0;
      border-radius: 10px;
      background: #fff;
      color: #1a2a3a;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
    }
    .filter-row select:focus { border-color: #2e86de; }

    .error {
      color: #d63031;
      font-size: 0.9rem;
      margin-bottom: 16px;
      min-height: 20px;
      text-align: center;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #c8dff5;
      border-top-color: #2e86de;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner.active { display: block; }

    .summary-banner {
      width: 100%;
      max-width: 1100px;
      background: #2e86de;
      border-radius: 16px;
      padding: 18px 28px;
      display: none;
      justify-content: center;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(46,134,222,0.25);
    }
    .summary-banner.visible { display: flex; }
    .summary-banner .stat { text-align: center; }
    .summary-banner .label {
      font-size: 0.75rem;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }
    .summary-banner .value {
      font-size: 1.6rem;
      font-weight: 800;
      color: #ffffff;
      line-height: 1;
    }
    .summary-banner .sub-value {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.65);
      margin-top: 2px;
    }
    .summary-banner .sep { width: 1px; height: 48px; background: rgba(255,255,255,0.25); }

    .map-wrap {
      width: 100%;
      max-width: 1100px;
      margin-bottom: 24px;
      display: none;
    }
    .map-wrap.visible { display: block; }
    .map-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #7799bb;
      margin-bottom: 10px;
    }
    #map {
      width: 100%;
      height: 420px;
      border-radius: 16px;
      border: 1px solid #c8dff5;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(46,134,222,0.12);
    }

    .rest-wrap { width: 100%; max-width: 1100px; display: none; }
    .rest-wrap.visible { display: block; }

    .rest-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #ffffff;
      border: 1px solid #c8dff5;
      border-radius: 16px 16px 0 0;
      padding: 16px 24px;
      box-shadow: 0 2px 8px rgba(46,134,222,0.08);
    }
    .rest-header span { font-size: 1rem; font-weight: 700; color: #1a3a5c; }
    .rest-loading { font-size: 0.8rem; color: #7799bb; font-weight: 400; }

    .rest-table {
      width: 100%;
      border-collapse: collapse;
      background: #ffffff;
      border: 1px solid #c8dff5;
      border-top: none;
      border-radius: 0 0 16px 16px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(46,134,220,0.08);
    }
    .rest-table thead th {
      background: #f0f7ff;
      padding: 10px 16px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #5577aa;
      text-align: left;
      border-bottom: 1px solid #d0e8f8;
    }
    .rest-table tbody tr { border-bottom: 1px solid #eef5fb; transition: background 0.15s; }
    .rest-table tbody tr:last-child { border-bottom: none; }
    .rest-table tbody tr:hover { background: #f8fbff; }
    .rest-table tbody td { padding: 12px 16px; font-size: 0.9rem; color: #1a3a5c; vertical-align: middle; }

    .cuisine-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 600;
      background: #e8f3ff;
      color: #2e6db4;
      border: 1px solid #c8dff5;
    }

    .open-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 700;
    }
    .open-yes     { background: #d5ffe8; color: #00854d; border: 1px solid #80d8a8; }
    .open-no      { background: #ffd5d5; color: #c0392b; border: 1px solid #e08080; }
    .open-unknown { background: #f0f0f0; color: #7799bb; border: 1px solid #ccddef; }

    .hours-text { font-size: 0.78rem; color: #5577aa; margin-top: 3px; }

    .map-pin-link {
      color: #2e86de;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .map-pin-link:hover { text-decoration: underline; }

    @media (max-width: 860px) {
      .summary-banner { gap: 16px; padding: 14px 16px; }
      .summary-banner .sep { display: none; }
      /* Hide Hours column on tablets — too wide */
      .rest-table thead th:nth-child(6),
      .rest-table tbody td:nth-child(6) { display: none; }
    }
    @media (max-width: 600px) {
      body { padding: 24px 10px 40px; }
      h1 { font-size: 1.5rem; }
      nav { flex-wrap: wrap; }
      nav a { font-size: 0.82rem; padding: 7px 14px; }
      .search-row { flex-wrap: wrap; gap: 10px; }
      .addr-group input { font-size: 0.95rem; padding: 11px 12px; }
      .search-btn { width: 100%; }
      .filter-row { gap: 8px; }
      .filter-row select { font-size: 0.85rem; padding: 7px 10px; }
      .summary-banner .value { font-size: 1.2rem; }
      #map { height: 280px; }
      /* Scrollable table on small phones */
      .rest-wrap { overflow-x: auto; }
      .rest-table { min-width: 480px; }
    }
    @media (max-width: 400px) {
      #map { height: 220px; }
      .rest-table { min-width: 420px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">Enroute Weather</a>
    <a href="restaurants.html" class="active">Restaurants</a>
  </nav>

  <h1>Nearby Restaurants</h1>
  <p class="subtitle">Find restaurants near any US location</p>

  <div class="search-row">
    <div class="addr-group">
      <label>Location</label>
      <input type="text" id="addr" value="Chicago, IL" autocomplete="on" placeholder="e.g. Chicago, IL" />
    </div>
    <button class="search-btn" id="searchBtn">Search</button>
  </div>

  <div class="filter-row">
    <label>Cuisine:</label>
    <select id="cuisineFilter">
      <option value="">All</option>
      <option value="american">American</option>
      <option value="pizza">Pizza</option>
      <option value="burger">Burger</option>
      <option value="mexican">Mexican</option>
      <option value="chinese">Chinese</option>
      <option value="italian">Italian</option>
      <option value="sandwich">Sandwich</option>
      <option value="coffee_shop">Coffee</option>
      <option value="fast_food">Fast Food</option>
      <option value="indian">Indian</option>
    </select>
    <label>Radius:</label>
    <select id="radiusFilter">
      <option value="805">0.5 mi</option>
      <option value="1609" selected>1 mi</option>
      <option value="3219">2 mi</option>
      <option value="8047">5 mi</option>
    </select>
  </div>

  <div class="error" id="errorMsg"></div>
  <div class="spinner" id="spinner"></div>

  <div class="summary-banner" id="summaryBanner">
    <div class="stat">
      <div class="label">Location</div>
      <div class="value" style="font-size:1.1rem" id="locName">--</div>
      <div class="sub-value" id="locSub">--</div>
    </div>
    <div class="sep"></div>
    <div class="stat">
      <div class="label">Restaurants Found</div>
      <div class="value" id="restCount">--</div>
      <div class="sub-value">within radius</div>
    </div>
  </div>

  <div class="map-wrap" id="mapWrap">
    <div class="map-label">Map</div>
    <div id="map"></div>
  </div>

  <div class="rest-wrap" id="restWrap">
    <div class="rest-header">
      <span>🍽️ Nearby Restaurants</span>
      <span class="rest-loading" id="restLoading"></span>
    </div>
    <table class="rest-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Cuisine</th>
          <th>Distance</th>
          <th>Status</th>
          <th>Hours</th>
          <th>Map</th>
        </tr>
      </thead>
      <tbody id="restBody"></tbody>
    </table>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    function haversine(lat1, lon1, lat2, lon2) {
      const R = 3958.8;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat/2)**2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    async function fetchGeo(address) {
      const url = `https://nominatim.openstreetmap.org/search?` +
        new URLSearchParams({ q: address, countrycodes: 'us', format: 'json', limit: 1, addressdetails: 1 });
      const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
      if (!res.ok) throw new Error(`Could not geocode: "${address}"`);
      const data = await res.json();
      if (!data.length) throw new Error(`Address not found: "${address}". Try adding a city or state.`);
      const place = data[0];
      const addr = place.address;
      return {
        lat:     parseFloat(place.lat),
        lon:     parseFloat(place.lon),
        city:    addr.city || addr.town || addr.village || addr.county || '',
        state:   addr.state || '',
        display: place.display_name.split(',').slice(0, 3).join(','),
      };
    }

    async function fetchRestaurants(lat, lon, radiusM, cuisine) {
      const cuisineFilter = cuisine ? `["cuisine"~"${cuisine}",i]` : '';
      const query = `
        [out:json][timeout:30];
        node["amenity"="restaurant"]${cuisineFilter}(around:${radiusM},${lat},${lon});
        out body;
      `;
      const res = await fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST',
        body: 'data=' + encodeURIComponent(query),
      });
      if (!res.ok) throw new Error('Could not fetch restaurant data.');
      const data = await res.json();
      return (data.elements || []).filter(r => r.tags && r.tags.name);
    }

    // Parse OSM opening_hours to determine if currently open
    function isOpenNow(oh) {
      if (!oh) return 'unknown';
      if (oh.trim() === '24/7') return 'open';

      const now = new Date();
      const dayIdx = now.getDay(); // 0=Sun, 1=Mon...
      const dayNames = ['su','mo','tu','we','th','fr','sa'];
      const todayKey = dayNames[dayIdx];
      const curMin = now.getHours() * 60 + now.getMinutes();

      // Normalize and split rules on ";"
      const rules = oh.toLowerCase().split(';').map(s => s.trim()).filter(Boolean);

      for (const rule of rules) {
        // Match pattern like: "Mo-Fr 09:00-22:00" or "Sa,Su 10:00-21:00"
        const m = rule.match(/^([a-z,\-]+)\s+(\d{1,2}:\d{2})-(\d{1,2}:\d{2})$/);
        if (!m) continue;

        const dayPart  = m[1];
        const openMin  = timeToMin(m[2]);
        const closeMin = timeToMin(m[3]);

        if (dayMatches(dayPart, todayKey)) {
          if (curMin >= openMin && curMin < closeMin) return 'open';
          return 'closed';
        }
      }
      return 'unknown';
    }

    function timeToMin(t) {
      const [h, m] = t.split(':').map(Number);
      return h * 60 + m;
    }

    const DAY_IDX = { mo:0, tu:1, we:2, th:3, fr:4, sa:5, su:6 };

    function dayMatches(dayPart, todayKey) {
      // Handle comma-separated groups: "mo,we,fr"
      for (const segment of dayPart.split(',')) {
        const s = segment.trim();
        if (s.includes('-')) {
          const [from, to] = s.split('-');
          const fi = DAY_IDX[from], ti = DAY_IDX[to], ci = DAY_IDX[todayKey];
          if (fi !== undefined && ti !== undefined && ci !== undefined) {
            if (fi <= ti ? (ci >= fi && ci <= ti) : (ci >= fi || ci <= ti)) return true;
          }
        } else if (s === todayKey) {
          return true;
        }
      }
      return false;
    }

    function cuisineLabel(tags) {
      return tags.cuisine
        ? tags.cuisine.replace(/_/g, ' ').replace(/;.*/,'').trim()
        : 'Restaurant';
    }

    // ── Map ──
    let map = null;
    let layerGroup = null;
    let restLayerGroup = null;
    let restIcon = null;

    function initMap() {
      if (map) return;
      map = L.map('map', { center: [39.5, -98.35], zoom: 13, scrollWheelZoom: true });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
        subdomains: 'abcd', maxZoom: 19,
      }).addTo(map);
      layerGroup    = L.layerGroup().addTo(map);
      restLayerGroup = L.layerGroup().addTo(map);
      restIcon = L.divIcon({
        className: '',
        html: `<div style="font-size:18px;line-height:1">🍽️</div>`,
        iconSize: [22,22], iconAnchor: [11,11], popupAnchor: [0,-13],
      });
    }

    function makeIcon(color) {
      return L.divIcon({
        className: '',
        html: `<div style="width:16px;height:16px;border-radius:50%;background:${color};border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>`,
        iconSize: [16,16], iconAnchor: [8,8], popupAnchor: [0,-10],
      });
    }

    function renderMap(geo, restaurants) {
      initMap();
      layerGroup.clearLayers();
      restLayerGroup.clearLayers();

      // Center marker
      L.marker([geo.lat, geo.lon], { icon: makeIcon('#ff3d3d') })
        .bindPopup(`<strong>${geo.display}</strong>`).addTo(layerGroup).openPopup();

      // Restaurant markers
      for (const r of restaurants) {
        const name    = r.tags.name || 'Restaurant';
        const cuisine = cuisineLabel(r.tags);
        L.marker([r.lat, r.lon], { icon: restIcon })
          .bindPopup(`<strong>${name}</strong><br><em>${cuisine}</em>`)
          .addTo(restLayerGroup);
      }

      map.setView([geo.lat, geo.lon], 14);
    }

    // ── Main ──
    function showError(msg) {
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('summaryBanner').classList.remove('visible');
      document.getElementById('mapWrap').classList.remove('visible');
      document.getElementById('restWrap').classList.remove('visible');
    }

    async function search() {
      const addr    = document.getElementById('addr').value.trim();
      const cuisine = document.getElementById('cuisineFilter').value;
      const radiusM = parseInt(document.getElementById('radiusFilter').value, 10);

      if (!addr) { showError('Please enter a location.'); return; }

      document.getElementById('errorMsg').textContent = '';
      document.getElementById('spinner').classList.add('active');
      document.getElementById('summaryBanner').classList.remove('visible');
      document.getElementById('mapWrap').classList.remove('visible');
      document.getElementById('restWrap').classList.remove('visible');

      try {
        const geo = await fetchGeo(addr);

        // Show map
        document.getElementById('mapWrap').classList.add('visible');
        renderMap(geo, []);
        map.invalidateSize();

        // Show table shell
        const restBody    = document.getElementById('restBody');
        const restLoading = document.getElementById('restLoading');
        restBody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#7799bb;padding:16px">Searching for nearby restaurants…</td></tr>';
        restLoading.textContent = 'searching…';
        document.getElementById('restWrap').classList.add('visible');

        const restaurants = await fetchRestaurants(geo.lat, geo.lon, radiusM, cuisine);

        // Sort by distance
        restaurants.sort((a, b) =>
          haversine(geo.lat, geo.lon, a.lat, a.lon) -
          haversine(geo.lat, geo.lon, b.lat, b.lon)
        );

        // Update map with restaurants
        renderMap(geo, restaurants);
        map.invalidateSize();

        // Summary banner
        document.getElementById('locName').textContent = geo.city
          ? `${geo.city}${geo.state ? ', ' + geo.state : ''}` : geo.display;
        document.getElementById('locSub').textContent = geo.display;
        document.getElementById('restCount').textContent = restaurants.length;
        document.getElementById('summaryBanner').classList.add('visible');

        if (!restaurants.length) {
          restBody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#7799bb;padding:16px">No restaurants found. Try increasing the radius or removing the cuisine filter.</td></tr>';
          restLoading.textContent = '0 found';
          return;
        }

        restBody.innerHTML = '';
        restaurants.forEach((r, idx) => {
          const name      = r.tags.name || '—';
          const cuisine   = cuisineLabel(r.tags);
          const distMi    = haversine(geo.lat, geo.lon, r.lat, r.lon);
          const distStr   = distMi < 0.1
            ? `${Math.round(distMi * 5280)} ft`
            : `${distMi.toFixed(2)} mi`;
          const openStatus = isOpenNow(r.tags.opening_hours);
          const openHTML  = openStatus === 'open'
            ? '<span class="open-badge open-yes">Open</span>'
            : openStatus === 'closed'
            ? '<span class="open-badge open-no">Closed</span>'
            : '<span class="open-badge open-unknown">Unknown</span>';
          const hoursText = r.tags.opening_hours
            ? r.tags.opening_hours.replace(/;/g, '<br>')
            : '<span style="color:#aabbcc">—</span>';
          const mapsUrl   = `https://www.openstreetmap.org/?mlat=${r.lat}&mlon=${r.lon}&zoom=17`;

          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${idx + 1}</td>
            <td style="font-weight:600">${name}</td>
            <td><span class="cuisine-badge">${cuisine}</span></td>
            <td>${distStr}</td>
            <td>${openHTML}</td>
            <td class="hours-text">${hoursText}</td>
            <td><a class="map-pin-link" href="${mapsUrl}" target="_blank" rel="noopener">View Map</a></td>
          `;
          restBody.appendChild(tr);
        });

        restLoading.textContent = `${restaurants.length} found`;

      } catch (err) {
        showError(err.message || 'Something went wrong. Please try again.');
      } finally {
        document.getElementById('spinner').classList.remove('active');
      }
    }

    document.getElementById('searchBtn').addEventListener('click', search);
    document.getElementById('addr').addEventListener('keydown', e => {
      if (e.key === 'Enter') search();
    });
  </script>
</body>
</html>
